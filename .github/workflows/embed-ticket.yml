name: Generate Ticket Embedding

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID'
        required: true
      ticket_subject:
        description: 'Ticket subject'
        required: true
      ticket_description:
        description: 'Ticket description'
        required: true

jobs:
  embed_ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

   
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openai==0.28.0
          pip install python-dotenv>=1.0.0
          pip install numpy

      - name: Generate embedding
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TICKET_ID: ${{ github.event.inputs.ticket_id }}
          TICKET_SUBJECT: ${{ github.event.inputs.ticket_subject }}
          TICKET_DESCRIPTION: ${{ github.event.inputs.ticket_description }}
        run: |
          python main.py > result.json
          cat result.json
