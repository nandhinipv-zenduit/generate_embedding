name: Generate Ticket Embedding

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Ticket ID'
        required: true
      ticket_subject:
        description: 'Ticket subject'
        required: true
      ticket_description:
        description: 'Ticket description'
        required: true

jobs:
  embed_ticket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate embedding and send to Zoho Flow
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ZOHO_FLOW_WEBHOOK: ${{ secrets.ZOHO_FLOW_WEBHOOK }}
          TICKET_ID: ${{ github.event.inputs.ticket_id }}
          TICKET_SUBJECT: ${{ github.event.inputs.ticket_subject }}
          TICKET_DESCRIPTION: ${{ github.event.inputs.ticket_description }}
        run: python main.py
